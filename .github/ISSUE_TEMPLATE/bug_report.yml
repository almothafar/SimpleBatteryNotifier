name: 🐞 Bug report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug. The more detail you give, the faster it can be fixed.
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Shown in the app / Play listing (e.g. 2.0.71).
      placeholder: "2.0.71"
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g. Huawei Mate 10 Pro (BLA-L29)"
    validations:
      required: true
  - type: input
    id: android
    attributes:
      label: Android / vendor skin version
      placeholder: "e.g. Android 10 / EMUI 12"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug — what went wrong.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect instead?
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Logs / screenshots (optional)
      description: Paste any logcat output or drag in screenshots.
    validations:
      required: false
