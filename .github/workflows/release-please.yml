name: Release Please

# On every push to master, release-please maintains a standing "release PR" that
# bumps the version + updates CHANGELOG.md from the Conventional Commit history.
# Merging that PR creates the `v<semver>` git tag and GitHub Release. app/build.gradle
# then derives versionName / versionCode from that tag — the tag is the single
# source of truth, this action just creates it.

on:
  push:
    branches: [ master ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR & tag
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
