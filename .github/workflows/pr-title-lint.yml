name: PR Title

# PRs are squash-merged, so the PR title becomes the commit message on master —
# which is what release-please reads to decide the version bump. This check keeps
# every PR title in Conventional Commit form (`type: description`).

on:
  pull_request_target:
    types: [ opened, edited, synchronize, reopened ]
    branches: [ master ]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed Conventional Commit types. `feat`/`fix` drive version bumps;
          # the rest land in history/changelog without bumping.
          types: |
            feat
            fix
            perf
            refactor
            docs
            build
            ci
            chore
            test
            style
            revert
